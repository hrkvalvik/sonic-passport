            const StatsView = ({ entries }) => {
                const stats = useMemo(() => {
                    const totalMinutes = entries.reduce(
                        (acc, curr) => acc + (parseInt(curr.duration) || 0),
                        0,
                    );
                    const countryScores = {};

                    entries.forEach((e) => {
                        const c = normalizeCountry(e.country);
                        if (!countryScores[c])
                            countryScores[c] = { sum: 0, count: 0 };
                        countryScores[c].sum += parseInt(e.score);
                        countryScores[c].count += 1;
                    });

                    const topCountries = Object.entries(countryScores)
                        .map(([name, data]) => ({
                            name,
                            avg: (data.sum / data.count).toFixed(1),
                        }))
                        .sort((a, b) => b.avg - a.avg)
                        .slice(0, 10);

                    return { totalMinutes, topCountries };
                }, [entries]);

                return (
                    <div className="max-w-4xl mx-auto w-full p-6 space-y-8 h-full overflow-y-auto custom-scrollbar">

                            </div>
                            <div className="bg-neutral-900 border border-neutral-800 p-6 text-center">
                                <div className="text-3xl font-bold text-white mb-1">

                                    )}

                                <div className="text-[10px] uppercase tracking-widest text-neutral-500">

                            </div>
                            <div className="bg-neutral-900 border border-neutral-800 p-6 text-center">
                                <div className="text-3xl font-bold text-white mb-1">
                                    {(
                                        stats.totalMinutes /
                                        (60 * 24 * 7)
                                    ).toFixed(1)}
                                </div>
                                <div className="text-[10px] uppercase tracking-widest text-neutral-500">
                                    Weeks
                                </div>
                            </div>
                        </div>

                                Top Rated Territories
                            </h2>
                            <div className="space-y-4">
                                {stats.topCountries.map((c, i) => (
                                    <div
                                        key={c.name}
                                        className="flex items-center gap-4 group"
                                    >
                                        <div className="w-6 text-[10px] text-neutral-500 font-bold">
                                            {i + 1}.
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex justify-between text-[10px] uppercase tracking-widest mb-1">

                        !L ||
                        typeof L.map !== "function" ||
                        mapRef.current ||
                        !mapContainerRef.current
                    )
                        return;

                    const m = L.map(mapContainerRef.current, {
                        center: [20, 0],
                        zoom: 2,
                        minZoom: 2,
                        zoomControl: false,
                        attributionControl: false,
                    });
                    L.tileLayer(
                        "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
                    ).addTo(m);

                    fetch(
                        "https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson",
                    )
                        .then((r) => r.json())
                        .then((data) => {
                            geoRef.current = L.geoJson(data, {
                                style: (f) => ({
                                    fillColor: ratedCountries.some(
                                        (c) =>
                                            normalizeCountry(c) ===
                                            normalizeCountry(f.properties.name),
                                    )
                                        ? "#fff"
                                        : "#111",
                                    weight: 1,
                                    color: "#333",
                                    fillOpacity: 0.8,
                                }),
                                onEachFeature: (f, l) => {
                                    l.on({
                                        mouseover: (e) => {
                                            e.target.setStyle({
                                                weight: 2,
                                                color: "#fff",
                                            });
                                            e.target.bringToFront();
                                        },
                                        mouseout: (e) =>
                                            geoRef.current.resetStyle(e.target),
                                        click: () =>
                                            onCountryClick(f.properties.name),
                                    });
                                    l.bindTooltip(f.properties.name, {
                                        className: "leaflet-tooltip-custom",
                                    });
                                },
                            }).addTo(m);
                        });

                    mapRef.current = m;

                    const resizeObserver = new ResizeObserver(() => {
                        if (mapRef.current) mapRef.current.invalidateSize();
                    });
                    resizeObserver.observe(mapContainerRef.current);

                    return () => {
                        if (mapRef.current) {
                            mapRef.current.remove();
                            mapRef.current = null;
                        }
                        resizeObserver.disconnect();
                    };
                }, []);

                useEffect(() => {
                    if (geoRef.current) {
                        geoRef.current.setStyle((f) => ({
                            fillColor: ratedCountries.some(
                                (c) =>
                                    normalizeCountry(c) ===
                                    normalizeCountry(f.properties.name),
                            )
                                ? "#fff"
                                : "#111",
                            weight: 1,
                            color: "#333",
                            fillOpacity: 0.8,
                        }));
                    }
                }, [ratedCountries]);

                return (
                    <div
                        ref={mapContainerRef}
                        className="absolute inset-0 bg-black z-0"
                    />
                );
            };

            const LoginView = () => {
                const handleLogin = async () => {
                    const { getAuth, signInWithPopup, GoogleAuthProvider } =
                        window.FirebaseSDK;
                    const auth = getAuth();
                    const provider = new GoogleAuthProvider();
                    try {
                        await signInWithPopup(auth, provider);
                    } catch (e) {
                        console.error("Login failed", e);
                        alert("Login failed: " + e.message);
                    }
                };

                return (
                    <div className="min-h-screen bg-neutral-950 flex items-center justify-center p-4">
                        <div className="bg-neutral-900 border border-neutral-800 p-8 max-w-sm w-full text-center space-y-6 shadow-2xl">
                            <div>
                                <div className="inline-flex bg-white p-2 mb-4">
                                    <Icon
                                        name="globe"
                                        className="w-8 h-8 text-black"
                                    />
                                </div>
                                <h1 className="text-xl font-bold text-white uppercase tracking-[0.3em]">
                                    Sonic Passport
                                </h1>
                            </div>
                            <div className="h-px bg-neutral-800 w-full"></div>
                            <p className="text-neutral-500 text-[10px] uppercase tracking-widest leading-relaxed">
                                Restricted Access.
                                <br />
                                Authorized Personnel Only.
                            </p>
                            <button
                                onClick={handleLogin}
                                className="w-full py-3 bg-white hover:bg-neutral-200 text-black font-bold uppercase text-[10px] tracking-[0.2em] transition-colors flex items-center justify-center gap-2"
                            >
                                <Icon name="log-in" className="w-4 h-4" /> Sign
                                in with Google
                            </button>
                        </div>
                    </div>
                );
            };

            const UnauthorizedView = ({ email, onLogout }) => (
                <div className="min-h-screen bg-neutral-950 flex items-center justify-center p-4">
                    <div className="bg-neutral-900 border border-red-900/50 p-8 max-w-sm w-full text-center space-y-6">
                        <Icon
                            name="lock"
                            className="w-12 h-12 text-red-600 mx-auto"
                        />
                        <h2 className="text-white font-bold uppercase tracking-widest text-lg">
                            Access Denied
                        </h2>
                        <p className="text-neutral-500 text-xs">
                            The account{" "}
                            <span className="text-white">{email}</span> is not
                            authorized to edit this passport.
                        </p>
                        <button
                            onClick={onLogout}
                            className="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold uppercase text-[10px] tracking-widest transition-colors"
                        >
                            Sign Out
                        </button>
                    </div>
                </div>
            );

            function App() {
                const [user, setUser] = useState(null);
                const [syncKey, setSyncKey] = useState(
                    () =>
                        localStorage.getItem("sonic_sync_key") ||
                        "default-passport",
                );
                const [entries, setEntries] = useState([]);
                const [view, setView] = useState("list");
                const [search, setSearch] = useState("");
                const [modal, setModal] = useState({
                    open: false,
                    country: null,
                    entry: null,
                    viewMode: "list",
                });
                const [isConfiguring, setIsConfiguring] = useState(false);
                const [isCheckingAuth, setIsCheckingAuth] = useState(true);
                const [configError, setConfigError] = useState(null);
                const [permissionError, setPermissionError] = useState(false);
                const [theme, setTheme] = useState(
                    () => localStorage.getItem("sonic_theme") || "dark",
                );

                useEffect(() => {
                    document.documentElement.setAttribute("data-theme", theme);
                    localStorage.setItem("sonic_theme", theme);
                }, [theme]);

                // Firebase Initialization
                useEffect(() => {
                    const { initializeApp, getAuth, onAuthStateChanged } =
                        window.FirebaseSDK;

                    try {
                        let firebaseConfig;

                        // CHECK 1: Try to use MANUAL_FIREBASE_CONFIG (now loaded via config.js or inline fallback)
                        // Ensure apiKey exists and isn't the placeholder
                        if (
                            typeof MANUAL_FIREBASE_CONFIG !== "undefined" &&
                            MANUAL_FIREBASE_CONFIG.apiKey &&
                            !MANUAL_FIREBASE_CONFIG.apiKey.includes(
                                "YOUR_API_KEY",
                            )
                        ) {
                            firebaseConfig = MANUAL_FIREBASE_CONFIG;
                        }
                        // Fallback for environment configuration
                        else if (
                            typeof window.__firebase_config !== "undefined" &&
                            window.__firebase_config
                        ) {
                            firebaseConfig = JSON.parse(
                                window.__firebase_config,
                            );
                        }

                        if (!firebaseConfig || !firebaseConfig.apiKey) {
                            throw new Error("PLACEHOLDER_DETECTED");
                        }

                        const app = initializeApp(firebaseConfig);
                        const auth = getAuth(app);

                        const unsub = onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            setIsCheckingAuth(false);
                        });
                        return () => unsub();
                    } catch (e) {
                        console.error(e);
                        if (e.message === "PLACEHOLDER_DETECTED") {
                            setConfigError(
                                "CONFIGURATION REQUIRED: Please Ensure 'config.js' exists and contains valid credentials, or edit index.html directly.",
                            );
                        } else {
                            setConfigError(
                                "Firebase Configuration Error: " + e.message,
                            );
                        }
                        setIsCheckingAuth(false);
                    }
                }, []);

                // Auto-set Sync Key based on email for seamless multi-device support
                useEffect(() => {
                    if (user && syncKey === "default-passport") {
                        // Create a safe key from email (e.g. user@gmail.com -> user-gmail-com)
                        const autoKey = user.email
                            .replace(/[^a-z0-9]/g, "-")
                            .toLowerCase();
                        setSyncKey(autoKey);
                    }
                }, [user]);

                // Data Sync
                useEffect(() => {
                    if (!user || user.email !== ALLOWED_EMAIL) return;
                    const { getFirestore, collection, onSnapshot } =
                        window.FirebaseSDK;
                    const db = getFirestore();
                    const appId =
                        typeof window.__app_id !== "undefined"
                            ? window.__app_id
                            : "sonic-passport";

                    const colRef = collection(
                        db,
                        "artifacts",
                        appId,
                        "public",
                        "data",
                        syncKey,
                    );

                    const unsub = onSnapshot(
                        colRef,
                        (snap) => {
                            const data = snap.docs.map((doc) => ({
                                ...doc.data(),
                                id: doc.id,
                            }));
                            setEntries(data);
                            setPermissionError(false);
                        },
                        (err) => {
                            console.error("Firestore Permission Error:", err);
                            if (err.code === "permission-denied") {
                                setPermissionError(true);
                            }
                        },
                    );

                    localStorage.setItem("sonic_sync_key", syncKey);
                    return () => unsub();
                }, [user, syncKey]);

                const uniqueCountries = useMemo(
                    () =>
                        new Set(
                            entries.map((e) => normalizeCountry(e.country)),
                        ),
                    [entries],
                );

                const countryEntries = useMemo(() => {
                    if (!modal.country) return [];
                    return entries.filter(
                        (e) =>
                            normalizeCountry(e.country) ===
                            normalizeCountry(modal.country),
                    );
                }, [entries, modal.country]);

                const handleSave = async (entry) => {
                    if (!user) return;
                    const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    const appId =
                        typeof window.__app_id !== "undefined"
                            ? window.__app_id
                            : "sonic-passport";
                    const docRef = doc(
                        db,
                        "artifacts",
                        appId,
                        "public",
                        "data",
                        syncKey,
                        entry.id,
                    );
                    try {
                        await setDoc(docRef, entry);
                        setModal({
                            open: false,
                            country: null,
                            entry: null,
                            viewMode: "list",
                        });
                    } catch (err) {
                        console.error("Save failed:", err);
                        if (err.code === "permission-denied") {
                            setPermissionError(true);
                        }
                    }
                };

                const handleDelete = async (id) => {
                    if (!user || !confirm("Delete permanently?")) return;
                    const { getFirestore, doc, deleteDoc } = window.FirebaseSDK;
                    const db = getFirestore();
                    const appId =
                        typeof window.__app_id !== "undefined"
                            ? window.__app_id
                            : "sonic-passport";
                    try {
                        await deleteDoc(
                            doc(
                                db,
                                "artifacts",
                                appId,
                                "public",
                                "data",
                                syncKey,
                                id,
                            ),
                        );
                    } catch (err) {
                        console.error("Delete failed:", err);
                        if (err.code === "permission-denied") {
                            setPermissionError(true);
                        }
                    }
                };

                const handleLogout = () => {
                    const { getAuth, signOut } = window.FirebaseSDK;
                    signOut(getAuth());
                };

                const handleSelectRandomUnexploredCountry = () => {
                    const exploredCountries = new Set(
                        entries.map((e) => normalizeCountry(e.country)),
                    );
                    const unexploredCountries = ALL_COUNTRIES.filter(
                        (c) => !exploredCountries.has(normalizeCountry(c)),
                    );

                    if (unexploredCountries.length === 0) {
                        alert(
                            "Congratulations! You've explored every country!",
                        );
                        return;
                    }

                    const randomCountry =
                        unexploredCountries[
                            Math.floor(
                                Math.random() * unexploredCountries.length,
                            )
                        ];

                    setModal({
                        open: true,
                        country: randomCountry,
                        entry: null,
                        viewMode: "form",
                    });
                };

                const handleExportToCSV = () => {
                    if (entries.length === 0) {
                        alert("No entries to export.");
                        return;
                    }

                    const headers = [
                        "id",
                        "country",
                        "band",
                        "album",
                        "genre",
                        "releaseDate",
                        "listenDate",
                        "score",
                        "link",
                        "songCount",
                        "duration",
                        "comment",
                    ];

                    const csvRows = [headers.join(",")];

                    entries.forEach((entry) => {
                        const values = headers.map((header) => {
                            const value = entry[header] || "";
                            const stringValue = String(value);
                            // Escape quotes and wrap in quotes if it contains commas or newlines
                            if (
                                stringValue.includes('"') ||
                                stringValue.includes(",")
                            ) {
                                return `"${stringValue.replace(/"/g, '""')}"`;
                            }
                            return stringValue;
                        });
                        csvRows.push(values.join(","));
                    });

                    const csvString = csvRows.join("\n");
                    const blob = new Blob([csvString], { type: "text/csv" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.setAttribute("hidden", "");
                    a.setAttribute("href", url);
                    a.setAttribute("download", "sonic-passport-export.csv");
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                };

                if (isCheckingAuth)
                    return (
                        <div className="min-h-screen bg-black flex items-center justify-center text-[10px] uppercase tracking-widest text-neutral-500 animate-pulse">
                            Authenticating...
                        </div>
                    );

                if (configError)
                    return (
                        <div className="min-h-screen bg-black flex flex-col items-center justify-center p-8 text-center text-neutral-500 text-xs">
                            <Icon
                                name="alert-triangle"
                                className="w-8 h-8 mb-4 text-red-500"
                            />
                            {configError}
                        </div>
                    );

                if (permissionError)
                    return (
                        <div className="min-h-screen bg-black flex flex-col items-center justify-center p-8 text-center text-neutral-500 text-xs">
                            <Icon
                                name="lock"
                                className="w-12 h-12 mb-4 text-red-500"
                            />
                            <h2 className="text-white font-bold uppercase tracking-widest text-lg mb-2">
                                Database Access Blocked
                            </h2>
                            <p className="max-w-md mb-6 leading-relaxed">
                                Your app is connected, but the database rejected
                                your request. This means your{" "}
                                <strong>Firebase Security Rules</strong> are not
                                set up for your email.
                            </p>
                            <div className="bg-neutral-900 border border-neutral-800 p-4 text-left font-mono text-[10px] text-neutral-400 mb-6 overflow-x-auto w-full max-w-lg">
                                <p className="mb-2 text-white">
                                    Go to Firebase Console &gt; Firestore &gt;
                                    Rules and paste this:
                                </p>
                                <pre className="whitespace-pre-wrap select-all">
                                    {`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /artifacts/{appId}/public/data/{syncKey}/{document=**} {
      allow read, write: if request.auth != null && request.auth.token.email == "${user?.email || "YOUR_EMAIL"}";
    }
  }
}`}
                                </pre>
                            </div>
                            <button
                                onClick={() => window.location.reload()}
                                className="bg-white text-black px-6 py-2 font-bold uppercase tracking-widest"
                            >
                                Retry
                            </button>
                        </div>
                    );

                if (!user) return <LoginView />;

                if (user.email !== ALLOWED_EMAIL)
                    return (
                        <UnauthorizedView
                            email={user.email}
                            onLogout={handleLogout}
                        />
                    );

                // Main App Render
                return (
                    <div className="min-h-screen flex flex-col">
                        <header className="bg-black border-b border-neutral-900 p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                            <div className="flex items-center gap-4">
                                <div className=" p-1">
                                    <img
                                        src="img/sonic-passport.png"
                                        width="28"
                                        height="28"
                                    ></img>
                                </div>
                                <h1 className="text-sm font-bold uppercase tracking-[0.3em] text-white">
                                    Sonic Passport
                                </h1>
                            </div>
                            <div className="flex border border-neutral-800 bg-neutral-950 overflow-x-auto w-full md:w-auto">
                                {["list", "map", "unexplored", "stats"].map(
                                    (v) => (
                                        <button
                                            key={v}
                                            onClick={() => setView(v)}
                                            className={`px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-all whitespace-nowrap flex-1 ${view === v ? "bg-white text-black" : "text-neutral-500 hover:text-white"}`}
                                        >
                                            {v}
                                        </button>
                                    ),
                                )}
                            </div>
                        </header>

                        <div className="bg-black border-b border-neutral-900 px-6 py-3 flex flex-wrap justify-between items-center text-[9px] uppercase tracking-widest text-neutral-500 gap-4">
                            <div className="flex gap-6">
                                <div>
                                    <span className="text-white font-bold">
                                        {uniqueCountries.size}
                                    </span>{" "}
                                    Countries
                                </div>
                                <div className="hidden sm:block">
                                    <span className="text-white font-bold">
                                        {entries.length}
                                    </span>{" "}
                                    Records
                                </div>
                                <button
                                    onClick={() =>
                                        setIsConfiguring(!isConfiguring)
                                    }
                                    className="flex items-center gap-2 hover:text-white"
                                >
                                    <Icon name="settings" className="w-3 h-3" />{" "}
                                    Sync:{" "}
                                    <span className="text-white">
                                        {syncKey}
                                    </span>
                                </button>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-neutral-600 truncate max-w-[80px] sm:max-w-none">
                                    {user.email}
                                </span>
                                <button
                                    onClick={() =>
                                        setTheme((t) =>
                                            t === "dark" ? "light" : "dark",
                                        )
                                    }
                                    className="p-2 text-neutral-500 hover:text-white"
                                    title="Toggle Theme"
                                >
                                    <Icon
                                        name={theme === "dark" ? "sun" : "moon"}
                                        className="w-4 h-4"
                                    />
                                </button>
                                <button
                                    onClick={handleLogout}
                                    className="hover:text-white"
                                >
                                    Sign Out
                                </button>
                                <button
                                    onClick={handleExportToCSV}
                                    className="p-2 text-neutral-500 hover:text-white"
                                    title="Export all data to CSV"
                                >
                                    <Icon name="download" className="w-4 h-4" />
                                </button>
                                <button
                                    onClick={
                                        handleSelectRandomUnexploredCountry
                                    }
                                    className="p-2 text-neutral-500 hover:text-white"
                                    title="Select Random Unexplored Country"
                                >
                                    <Icon name="dice-5" className="w-4 h-4" />
                                </button>
                                <button
                                    onClick={() =>
                                        setModal({
                                            open: true,
                                            country: null,
                                            entry: null,
                                            viewMode: "form",
                                        })
                                    }
                                    className="bg-white text-black px-4 py-2 font-bold flex items-center gap-2"
                                >
                                    <Icon name="plus" className="w-3 h-3" /> Log
                                    New
                                </button>
                            </div>
                        </div>

                        {isConfiguring && (
                            <div className="bg-neutral-900 border-b border-neutral-800 p-6">
                                <label className="block text-[10px] font-bold uppercase tracking-widest text-neutral-400 mb-2">
                                    Multi-Device Sync Key
                                </label>
                                <div className="flex gap-2 max-w-sm">
                                    <input
                                        value={syncKey}
                                        onChange={(e) =>
                                            setSyncKey(
                                                e.target.value
                                                    .toLowerCase()
                                                    .replace(/\s+/g, "-"),
                                            )
                                        }
                                        className="bg-black border border-neutral-700 p-3 text-xs w-full outline-none focus:border-white"
                                        placeholder="Enter key..."
                                    />
                                </div>
                                <p className="mt-2 text-[9px] text-neutral-500">
                                    Enter this same key on your phone or
                                    computer to sync your passport data.
                                </p>
                            </div>
                        )}

                        <main className="flex-1 relative overflow-hidden flex flex-col">
                            {view === "map" ? (
                                <div className="flex-1 relative w-full h-full bg-black">
                                    <LeafletMap
                                        ratedCountries={Array.from(
                                            uniqueCountries,
                                        )}
                                        onCountryClick={(c) =>
                                            setModal({
                                                open: true,
                                                country: c,
                                                entry: null,
                                                viewMode: "list",
                                            })
                                        }
                                    />
                                </div>
                            ) : view === "stats" ? (
                                <StatsView entries={entries} />
                            ) : (
                                <div className="max-w-4xl mx-auto w-full p-6 space-y-8 h-full overflow-y-auto custom-scrollbar">
                                    <div className="relative">
                                        <Icon
                                            name="search"
                                            className="absolute left-4 top-4 w-4 h-4 text-neutral-700"
                                        />
                                        <input
                                            value={search}
                                            onChange={(e) =>
                                                setSearch(e.target.value)
                                            }
                                            placeholder="Filter database..."
                                            className="w-full bg-black border border-neutral-900 p-4 pl-12 text-[10px] uppercase tracking-[0.2em] outline-none focus:border-neutral-600 transition-colors"
                                        />
                                    </div>

                                    {view === "list" ? (
                                        <div className="space-y-px bg-neutral-900 border border-neutral-900">
                                            {entries
                                                .filter((e) =>
                                                    [
                                                        e.country,
                                                        e.band,
                                                        e.album,
                                                        e.genre,
                                                    ].some((f) =>
                                                        f
                                                            ?.toLowerCase()
                                                            .includes(
                                                                search.toLowerCase(),
                                                            ),
                                                    ),
                                                )
                                                .sort(
                                                    (a, b) =>
                                                        new Date(b.listenDate) -
                                                        new Date(a.listenDate),
                                                )
                                                .map((e) => (
                                                    <div
                                                        key={e.id}
                                                        className="bg-black p-6 flex flex-col md:flex-row gap-6 items-start md:items-center group"
                                                    >
                                                        <div className="w-12 h-12 border border-neutral-900 bg-neutral-950 text-white flex items-center justify-center font-bold text-lg shrink-0">
                                                            {e.score}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <h3 className="flex flex-wrap items-center gap-x-4 gap-y-2 font-bold uppercase text-base text-white tracking-tight leading-5">
                                                                <div className="flex items-center gap-1 leading-5">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-disc3-icon lucide-disc-3 text-neutral-500 shrink min-w-[10px]"><circle cx="12" cy="12" r="10"/><path d="M6 12c0-1.7.7-3.2 1.8-4.2"/><circle cx="12" cy="12" r="2"/><path d="M18 12c0 1.7-.7 3.2-1.8 4.2"/></svg>
                                                                    {e.album}
                                                                </div>
                                                                <div className="text-neutral-500 flex items-center gap-1 leading-5">
                                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-users-icon lucide-users shrink min-w-[10px]"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.128a4 4 0 0 1 0 7.744"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/></svg>
                                                                    {e.band}
                                                                </div>
                                                            </h3>
                                                            <div className="flex flex-wrap gap-x-6 gap-y-2 mt-2 text-[9px] text-neutral-500 uppercase tracking-widest">
                                                                <span className="text-neutral-300">
                                                                    {e.country}
                                                                </span>
                                                                <span className="border border-neutral-800 px-2 bg-neutral-950">
                                                                    {e.genre}
                                                                </span>
                                                                <span>
                                                                    {
                                                                        e.listenDate
                                                                    }
                                                                </span>
                                                            </div>
                                                        </div>
                                                        <div className="flex gap-4 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity shrink-0">
                                                            {e.link && (
                                                                <a
                                                                    href={
                                                                        e.link
                                                                    }
                                                                    target="_blank"
                                                                    className="text-neutral-500 hover:text-white"
                                                                >
                                                                    <Icon
                                                                        name="external-link"
                                                                        className="w-4 h-4"
                                                                    />
                                                                </a>
                                                            )}
                                                            <button
                                                                onClick={() =>
                                                                    setModal({
                                                                        open: true,
                                                                        entry: e,
                                                                        viewMode:
                                                                            "form",
                                                                    })
                                                                }
                                                                className="text-neutral-500 hover:text-white"
                                                            >
                                                                <Icon
                                                                    name="edit-3"
                                                                    className="w-4 h-4"
                                                                />
                                                            </button>
                                                            <button
                                                                onClick={() =>
                                                                    handleDelete(
                                                                        e.id,
                                                                    )
                                                                }
                                                                className="text-neutral-800 hover:text-red-500"
                                                            >
                                                                <Icon
                                                                    name="trash-2"
                                                                    className="w-4 h-4"
                                                                />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-px bg-neutral-900 border border-neutral-900">
                                            {ALL_COUNTRIES.filter(
                                                (c) =>
                                                    !uniqueCountries.has(
                                                        normalizeCountry(c),
                                                    ) &&
                                                    c
                                                        .toLowerCase()
                                                        .includes(
                                                            search.toLowerCase(),
                                                        ),
                                            ).map((c) => (
                                                <div
                                                    key={c}
                                                    onClick={() =>
                                                        setModal({
                                                            open: true,
                                                            country: c,
                                                            viewMode: "list",
                                                        })
                                                    }
                                                    className="bg-black p-4 text-[9px] font-bold uppercase tracking-widest text-neutral-600 hover:text-white hover:bg-neutral-950 cursor-pointer transition-colors flex justify-between items-center group"
                                                >
                                                    <span>{c}</span>
                                                    <Icon
                                                        name="plus"
                                                        className="w-3 h-3 opacity-0 group-hover:opacity-100"
                                                    />
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </main>

                        <Modal
                            isOpen={modal.open}
                            onClose={() =>
                                setModal({
                                    open: false,
                                    country: null,
                                    entry: null,
                                    viewMode: "list",
                                })
                            }
                            title={
                                modal.viewMode === "list" &&
                                countryEntries.length > 0 &&
                                !modal.entry
                                    ? `History: ${modal.country}`
                                    : modal.entry
                                      ? "Edit Record"
                                      : `Log Record: ${modal.country || "Territory"}`
                            }
                        >
                            {modal.viewMode === "list" &&
                            countryEntries.length > 0 &&
                            !modal.entry ? (
                                <CountryDetails
                                    country={modal.country}
                                    entries={countryEntries}
                                    onEdit={(e) =>
                                        setModal({
                                            ...modal,
                                            entry: e,
                                            viewMode: "form",
                                        })
                                    }
                                    onAddNew={() =>
                                        setModal({
                                            ...modal,
                                            entry: null,
                                            viewMode: "form",
                                        })
                                    }
                                />
                            ) : (
                                <RatingForm
                                    initialCountry={modal.country}
                                    existingEntry={modal.entry}
                                    onSave={handleSave}
                                    onCancel={() => {
                                        if (
                                            modal.viewMode === "form" &&
                                            countryEntries.length > 0
                                        ) {
                                            setModal((prev) => ({
                                                ...prev,
                                                entry: null,
                                                viewMode: "list",
                                            }));
                                        } else {
                                            setModal({
                                                open: false,
                                                country: null,
                                                entry: null,
                                                viewMode: "list",
                                            });
                                        }
                                    }}
                                />
                            )}
                        </Modal>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(<App />);
        </script>
    </body>
</html>
